name: Validate JSON & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Validate JSON
        run: node validate.js

      - name: Check for required files
        run: |
          test -f data/authors.json || exit 1
          test -f data/search-index.json || exit 1
          test -f data/martinez-ares/chunk-1980-1999.json || exit 1
          test -f data/martinez-ares/chunk-2000-2019.json || exit 1
          test -f data/martinez-ares/chunk-2020-2033.json || exit 1

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ./
