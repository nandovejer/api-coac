name: Validate JSON & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Validate JSON
        run: node validate.js

      - name: Check for required files
        run: |
          test -f data/search-index.json || exit 1
          test -f data/chunk-1980-1999.json || exit 1
          test -f data/chunk-2000-2019.json || exit 1
          test -f data/chunk-2020-2029.json || exit 1

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to GitHub Pages
        uses: actions/upload-artifact@v3
        with:
          name: github-pages
          path: ./
